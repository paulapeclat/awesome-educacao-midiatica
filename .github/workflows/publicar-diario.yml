name: Publicação diária da fila

on:
  schedule:
    - cron: "0 12 * * *"   # todo dia, 12:00 UTC (~09:00 horário de Brasília)
  workflow_dispatch: {}    # permite publicar manualmente pela aba Actions

permissions:
  contents: write
  issues: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publicar próximo recurso da fila
        id: pub
        run: python scripts/publicar.py

      - name: Comitar publicação (se houver)
        env:
          NOME: ${{ steps.pub.outputs.nome }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md fila.json publicados.json feed.xml
          git diff --cached --quiet || git commit -m "feat: adiciona $NOME (publicação diária)"
          git pull --rebase origin main
          git push

      - name: Criar rascunho no blog da APedê (opcional — via secrets)
        if: steps.pub.outputs.nome != ''
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          NOME: ${{ steps.pub.outputs.nome }}
          URL_RECURSO: ${{ steps.pub.outputs.url }}
          DESCRICAO: ${{ steps.pub.outputs.descricao }}
        run: |
          python - <<'PY'
          import base64, json, os, sys, urllib.request

          wp_url = (os.environ.get("WP_URL") or "").rstrip("/")
          user = os.environ.get("WP_USER") or ""
          senha = os.environ.get("WP_APP_PASSWORD") or ""
          if not (wp_url and user and senha):
              print("WordPress não configurado (secrets WP_URL, WP_USER, WP_APP_PASSWORD) — pulando. Veja INTEGRACOES.md")
              sys.exit(0)

          nome = os.environ["NOME"]
          url = os.environ["URL_RECURSO"]
          desc = os.environ["DESCRICAO"]
          post = {
              "title": f"Recurso de educação midiática: {nome}",
              "status": "draft",
              "content": (
                  f'<p><strong><a href="{url}">{nome}</a></strong> — {desc}.</p>'
                  '<p>Publicado originalmente na minha lista curada '
                  '<a href="https://github.com/paulapeclat/awesome-educacao-midiatica">'
                  'Awesome Educação Midiática</a>, que cresce um recurso por dia.</p>'
              ),
          }
          req = urllib.request.Request(
              f"{wp_url}/wp-json/wp/v2/posts",
              data=json.dumps(post).encode(),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": "Basic " + base64.b64encode(f"{user}:{senha}".encode()).decode(),
              },
          )
          with urllib.request.urlopen(req, timeout=30) as r:
              rascunho = json.loads(r.read())
          print(f"Rascunho criado no blog: {rascunho.get('link', '(sem link)')} — revise e publique!")
          PY

      - name: Avisar quando a fila esvaziar
        if: steps.pub.outputs.vazia == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ABERTAS=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "Fila de publicação vazia in:title" --json number --jq 'length')
          if [ "$ABERTAS" = "0" ]; then
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "📭 Fila de publicação vazia" \
              --body "A fila de publicação diária acabou (ou está no último item). Adicione novos recursos em \`fila.json\` — formato: \`{ \"secao\": \"...\", \"nome\": \"...\", \"url\": \"https://...\", \"descricao\": \"...\" }\`. O robô volta a publicar sozinho no dia seguinte. 🌱"
          fi
